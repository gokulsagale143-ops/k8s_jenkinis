apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        # CRITICAL: Replace 'gokulsagale143' with your actual Docker Hub username
        image: gokulsagale143/nginx-app:IMAGE_TAG
        ports:
        - containerPort: 80
        imagePullPolicy: Always
